<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Portfolio - Bright Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0fdf4; /* Hijau sangat muda (mint) */
            --header-bg: #ffffff;
            --primary: #22c55e; /* Hijau cerah */
            --secondary: #3b82f6; /* Biru cerah */
            --accent: #a855f7; /* Ungu pastel */
            --text: #166534; /* Hijau tua untuk teks */
            --card: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; z-index: 999; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #dcfce7;
            border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Marquee / Running Text */
        .marquee-container {
            background: #22c55e;
            color: white;
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 700;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header {
            background: var(--header-bg);
            padding: 60px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        h1 { font-size: 2.5rem; font-weight: 800; color: #15803d; margin-bottom: 10px; }
        .subtitle { opacity: 0.7; margin-bottom: 30px; font-weight: 600; }

        /* Filter Dropdown */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        select {
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #dcfce7;
            background: white;
            color: var(--text);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        select:hover { border-color: var(--primary); background: #f0fdf4; }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: 0.3s;
            border: 1px solid #f0fdf4;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .img-box {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #f8fafc;
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .tag-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .tag {
            font-size: 11px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 10px;
            text-transform: uppercase;
        }
        /* Pastel Colors for Tags */
        .tag-kls { background: #dcfce7; color: #166534; }
        .tag-mapel { background: #dbeafe; color: #1e40af; }
        .tag-sem { background: #f3e8ff; color: #6b21a8; }

        .card h3 { font-size: 1.2rem; margin-bottom: 8px; color: #1e293b; }
        .card p { font-size: 0.9rem; color: #64748b; line-height: 1.5; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; padding: 0 40px; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p style="margin-top:10px; font-weight:600">Membuka Koleksi...</p></div>

    <div class="marquee-container">
        <div class="marquee" id="runText">MENGHUBUNGKAN KE GOOGLE SHEETS... MOHON TUNGGU • PORTFOLIO IPA SMA KELAS 10, 11, 12 •</div>
    </div>

    <header>
        <h1>My Science Path</h1>
        <p class="subtitle">Kumpulan tugas seru Fisika, Kimia, & Biologi</p>
        
        <div class="controls">
            <select id="selKelas">
                <option value="all">Semua Kelas</option>
                <option value="10">Kelas 10</option>
                <option value="11">Kelas 11</option>
                <option value="12">Kelas 12</option>
            </select>
            <select id="selMapel">
                <option value="all">Semua Mapel</option>
                <option value="Fisika">Fisika</option>
                <option value="Kimia">Kimia</option>
                <option value="Biologi">Biologi</option>
            </select>
            <select id="selSem">
                <option value="all">Semua Semester</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
            </select>
        </div>
    </header>

    <main class="grid" id="mainGrid"></main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv';
        
        let localDb = [];

        async function loadSheets() {
            try {
                const res = await fetch(CSV_URL);
                const raw = await res.text();
                const baris = raw.split('\n').slice(1);

                localDb = baris.map(r => {
                    const c = r.split(',');
                    if(c.length < 5) return null;
                    return {
                        kls: c[0]?.trim(),
                        mpl: c[1]?.trim(),
                        sem: c[2]?.trim(),
                        judul: c[3]?.trim(),
                        img: c[4]?.trim(),
                        desc: c[5]?.trim() || ""
                    };
                }).filter(x => x !== null);

                document.getElementById('runText').innerText = `BERHASIL DIMUAT! TOTAL: ${localDb.length} TUGAS • SEMANGAT BELAJARNYA YA! • `;
                display(localDb);
            } catch (e) {
                alert("Gagal ambil data. Cek koneksi internet.");
            } finally {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }
        }

        function display(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map(i => `
                <div class="card">
                    <div class="img-box">
                        <img src="${i.img}" onerror="this.src='https://via.placeholder.com/400x300?text=Cek+Link+Foto+di+Sheets'">
                    </div>
                    <div class="tag-group">
                        <span class="tag tag-kls">Kls ${i.kls}</span>
                        <span class="tag tag-mapel">${i.mpl}</span>
                        <span class="tag tag-sem">Sem ${i.sem}</span>
                    </div>
                    <h3>${i.judul}</h3>
                    <p>${i.desc}</p>
                </div>
            `).join('');
        }

        function filterSkrg() {
            const k = document.getElementById('selKelas').value;
            const m = document.getElementById('selMapel').value;
            const s = document.getElementById('selSem').value;

            const filtered = localDb.filter(d => 
                (k === 'all' || d.kls == k) &&
                (m === 'all' || d.mpl.toLowerCase() === m.toLowerCase()) &&
                (s === 'all' || d.sem == s)
            );
            display(filtered);
        }

        // Admin Function (Ganti text jalan via console)
        window.setAdminText = (token, txt) => {
            if(token === "admin123") {
                document.getElementById('runText').innerText = txt + " • " + txt;
                return "Sukses!";
            }
            return "Token Salah";
        }

        document.querySelectorAll('select').forEach(s => s.addEventListener('change', filterSkrg));
        window.onload = loadSheets;
    </script>
</body>
</html>
