<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Portfolio - SMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Loader tetap ada agar user tahu proses sedang jalan */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 99; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .marquee-container { background: var(--primary); padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .marquee { display: inline-block; animation: marquee 20s linear infinite; font-weight: bold; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { text-align: center; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .p-4 { padding: 20px; }
        .tag { font-size: 10px; background: rgba(99,102,241,0.2); color: #818cf8; padding: 4px 8px; border-radius: 5px; margin-right: 5px; }
        
        /* Pesan Error jika link gagal */
        #error-msg { display: none; color: #f87171; text-align: center; margin-top: 20px; padding: 20px; border: 1px dashed #f87171; border-radius: 10px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Sedang Mengambil Data...</p></div>

<div class="marquee-container"><div class="marquee">PORTFOLIO TUGAS IPA KELAS 10-12 • REFRESH UNTUK UPDATE DATA •</div></div>

<header>
    <h1>Database Tugas IPA</h1>
    <div id="error-msg">
        <b>Waduh! Data gagal dimuat.</b><br>
        Pastikan link Google Sheets sudah di-"Publish to Web" sebagai CSV.
    </div>
</header>

<main class="grid" id="tugasGrid"></main>

<script>
    // MASUKKAN LINK CSV KAMU DI SINI
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv';

    async function loadData() {
        try {
            console.log("Memulai fetch...");
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.text();
            console.log("Data diterima!");
            
            const rows = data.split('\n').slice(1); 
            const grid = document.getElementById('tugasGrid');
            
            if(rows.length === 0) {
                grid.innerHTML = "<p>Data di Sheets masih kosong.</p>";
                return;
            }

            let html = '';
            rows.forEach(row => {
                const col = row.split(',');
                if(col.length >= 5) {
                    html += `
                    <div class="card">
                        <img src="${col[4].trim()}" onerror="this.src='https://via.placeholder.com/400x200?text=Gambar+Rusak'">
                        <div class="p-4">
                            <span class="tag">Kls ${col[0]}</span><span class="tag">${col[1]}</span>
                            <h3>${col[3]}</h3>
                            <p style="font-size: 14px; opacity: 0.7;">${col[5] || ''}</p>
                        </div>
                    </div>`;
                }
            });
            
            grid.innerHTML = html;
            document.getElementById('loader').style.display = 'none';

        } catch (error) {
            console.error("Error Detail:", error);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
